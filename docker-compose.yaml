name: klimiter-local

x-redis-cluster-base: &redis-cluster-base
  image: redis:7.4-alpine
  healthcheck:
    test: ["CMD-SHELL", "redis-cli -p $$REDIS_PORT ping | grep PONG"]
    interval: 5s
    timeout: 3s
    retries: 10
  networks:
    - klimiter-network
  profiles:
    - redis_cluster
    - app_cluster

x-app-common-environment: &app-common-environment
  JAVA_TOOL_OPTIONS: >-
    -Xms128m
    -Xmx384m
    -Dspring.jmx.enabled=false
    -Dfile.encoding=UTF-8

x-app-base: &app-base
  build: .
  env_file:
    - .env
  mem_limit: 512m
  expose:
    - "9090"
    - "8080"
  healthcheck:
    test: ["CMD-SHELL", "wget -qO- http://localhost:$${SERVER_PORT:-8080}/actuator/health | grep -q '\"status\":\"UP\"'"]
    interval: 5s
    timeout: 3s
    retries: 20
    start_period: 30s
  networks:
    - klimiter-network

services:
  redis-standalone:
    image: redis:7.4-alpine
    container_name: redis-standalone
    command: redis-server --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - klimiter-network
    profiles:
      - redis_standalone
      - app_standalone

  redis-cluster-1:
    <<: *redis-cluster-base
    container_name: redis-cluster-1
    environment:
      REDIS_PORT: 7001
    command: >
      redis-server
      --port 7001
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly no
      --cluster-announce-ip redis-cluster-1
      --cluster-announce-port 7001
      --cluster-announce-bus-port 17001
    ports:
      - "7001:7001"
      - "17001:17001"

  redis-cluster-2:
    <<: *redis-cluster-base
    container_name: redis-cluster-2
    environment:
      REDIS_PORT: 7002
    command: >
      redis-server
      --port 7002
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly no
      --cluster-announce-ip redis-cluster-2
      --cluster-announce-port 7002
      --cluster-announce-bus-port 17002
    ports:
      - "7002:7002"
      - "17002:17002"

  redis-cluster-3:
    <<: *redis-cluster-base
    container_name: redis-cluster-3
    environment:
      REDIS_PORT: 7003
    command: >
      redis-server
      --port 7003
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly no
      --cluster-announce-ip redis-cluster-3
      --cluster-announce-port 7003
      --cluster-announce-bus-port 17003
    ports:
      - "7003:7003"
      - "17003:17003"

  redis-cluster-init:
    image: redis:7.4-alpine
    container_name: redis-cluster-init
    volumes:
      - ./docker/redis-cluster/cluster-init.sh:/cluster-init.sh:ro
    entrypoint: ["sh", "/cluster-init.sh"]
    depends_on:
      redis-cluster-1:
        condition: service_healthy
      redis-cluster-2:
        condition: service_healthy
      redis-cluster-3:
        condition: service_healthy
    networks:
      - klimiter-network
    profiles:
      - redis_cluster
      - app_cluster

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    ports:
      - "5540:5540"
    environment:
      RI_ACCEPT_TERMS_AND_CONDITIONS: "true"
      RI_REDIS_HOST0: redis-standalone
      RI_REDIS_PORT0: "6379"
      RI_REDIS_ALIAS0: standalone
      RI_REDIS_HOST1: redis-cluster-1
      RI_REDIS_PORT1: "7001"
      RI_REDIS_ALIAS1: cluster-node-1
    networks:
      - klimiter-network
    profiles:
      - redis_standalone
      - redis_cluster
      - app_standalone
      - app_cluster

  app-standalone:
    <<: *app-base
    container_name: klimiter-app-standalone
    environment:
      <<: *app-common-environment
      KLIMITER_BACKEND_MODE: REDIS_STANDALONE
      KLIMITER_BACKEND_REDIS_URI: redis://redis-standalone:6379
    ports:
      - "${GRPC_PORT:-9090}:9090"
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      redis-standalone:
        condition: service_healthy
    profiles:
      - app_standalone

  app-1:
    <<: *app-base
    container_name: klimiter-app-1
    environment:
      <<: *app-common-environment
      KLIMITER_BACKEND_MODE: REDIS_CLUSTER
      KLIMITER_BACKEND_REDIS_URIS: redis://redis-cluster-1:7001,redis://redis-cluster-2:7002,redis://redis-cluster-3:7003
    depends_on:
      redis-cluster-init:
        condition: service_completed_successfully
    profiles:
      - app_cluster

  app-2:
    <<: *app-base
    container_name: klimiter-app-2
    environment:
      <<: *app-common-environment
      KLIMITER_BACKEND_MODE: REDIS_CLUSTER
      KLIMITER_BACKEND_REDIS_URIS: redis://redis-cluster-1:7001,redis://redis-cluster-2:7002,redis://redis-cluster-3:7003
    depends_on:
      redis-cluster-init:
        condition: service_completed_successfully
    profiles:
      - app_cluster

  app-3:
    <<: *app-base
    container_name: klimiter-app-3
    environment:
      <<: *app-common-environment
      KLIMITER_BACKEND_MODE: REDIS_CLUSTER
      KLIMITER_BACKEND_REDIS_URIS: redis://redis-cluster-1:7001,redis://redis-cluster-2:7002,redis://redis-cluster-3:7003
    depends_on:
      redis-cluster-init:
        condition: service_completed_successfully
    profiles:
      - app_cluster

  nginx:
    image: nginx:alpine
    container_name: klimiter-nginx
    ports:
      - "${GRPC_PORT:-9090}:9090"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app-1:
        condition: service_healthy
      app-2:
        condition: service_healthy
      app-3:
        condition: service_healthy
    networks:
      - klimiter-network
    profiles:
      - app_cluster
    ulimits:
      nofile:
        soft: 200000
        hard: 200000

networks:
  klimiter-network:
    driver: bridge
