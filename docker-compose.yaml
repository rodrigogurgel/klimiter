name: klimiter-local

x-redis-cluster-base: &redis-cluster-base
  image: redis:7.4-alpine
  healthcheck:
    test: [ "CMD-SHELL", "redis-cli -p $$REDIS_PORT ping | grep PONG" ]
    interval: 5s
    timeout: 3s
    retries: 10
  networks:
    - klimiter-network

x-app-base: &app-base
  build: .
  deploy:
    resources:
      limits:
        memory: 512M
  environment:
    JAVA_TOOL_OPTIONS: >-
      -Xms128m
      -Xmx384m
      -Dspring.jmx.enabled=false
      -Dfile.encoding=UTF-8
    GRPC_PORT: 9090

    # Atenção:
    # Esta configuração NÃO é ideal para app dentro do Docker
    # quando o cluster anuncia 127.0.0.1.
    KLIMITER_MODE: cluster
    KLIMITER_REDIS_URIS: redis://localhost:7001,redis://localhost:7002,redis://localhost:7003

    # Standalone, se quiser testar:
    # KLIMITER_MODE: standalone
    # KLIMITER_REDIS_URIS: redis://redis-standalone:6379
  depends_on:
    redis-cluster-init:
      condition: service_completed_successfully
  networks:
    - klimiter-network

services:
  redis-standalone:
    image: redis:7.4-alpine
    container_name: redis-standalone
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - klimiter-network

  redis-cluster-1:
    <<: *redis-cluster-base
    container_name: redis-cluster-1
    environment:
      REDIS_PORT: 7001
    command: >
      redis-server
      --port 7001
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly no
      --cluster-announce-ip redis-cluster-1
      --cluster-announce-port 7001
      --cluster-announce-bus-port 17001
    ports:
      - "7001:7001"
      - "17001:17001"

  redis-cluster-2:
    <<: *redis-cluster-base
    container_name: redis-cluster-2
    environment:
      REDIS_PORT: 7002
    command: >
      redis-server
      --port 7002
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly no
      --cluster-announce-ip redis-cluster-2
      --cluster-announce-port 7002
      --cluster-announce-bus-port 17002
    ports:
      - "7002:7002"
      - "17002:17002"

  redis-cluster-3:
    <<: *redis-cluster-base
    container_name: redis-cluster-3
    environment:
      REDIS_PORT: 7003
    command: >
      redis-server
      --port 7003
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly no
      --cluster-announce-ip redis-cluster-3
      --cluster-announce-port 7003
      --cluster-announce-bus-port 17003
    ports:
      - "7003:7003"
      - "17003:17003"

  redis-cluster-init:
    image: redis:7.4-alpine
    container_name: redis-cluster-init
    volumes:
      - ./docker/redis-cluster/cluster-init.sh:/cluster-init.sh:ro
    entrypoint: [ "sh", "/cluster-init.sh" ]
    depends_on:
      redis-cluster-1:
        condition: service_healthy
      redis-cluster-2:
        condition: service_healthy
      redis-cluster-3:
        condition: service_healthy
    networks:
      - klimiter-network

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    ports:
      - "5540:5540"
    environment:
      RI_ACCEPT_TERMS_AND_CONDITIONS: "true"
      RI_REDIS_HOST0: redis-standalone
      RI_REDIS_PORT0: "6379"
      RI_REDIS_ALIAS0: standalone
      RI_REDIS_HOST1: redis-cluster-1
      RI_REDIS_PORT1: "7001"
      RI_REDIS_ALIAS1: cluster-node-1
    depends_on:
      redis-standalone:
        condition: service_healthy
      redis-cluster-init:
        condition: service_completed_successfully
    networks:
      - klimiter-network

  app-1:
    <<: *app-base
    container_name: klimiter-app-1
    profiles:
      - distributed

  app-2:
    <<: *app-base
    container_name: klimiter-app-2
    profiles:
      - distributed

  app-3:
    <<: *app-base
    container_name: klimiter-app-3
    profiles:
      - distributed

  nginx:
    image: nginx:alpine
    container_name: klimiter-nginx
    ports:
      - "9090:9090"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-1
      - app-2
      - app-3
    networks:
      - klimiter-network
    profiles:
      - distributed

networks:
  klimiter-network:
    driver: bridge