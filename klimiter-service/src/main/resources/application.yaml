spring:
  application:
    name: klimiter-service
  grpc:
    server:
      port: 9090
  docker:
    compose:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,configprops
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 0
  otlp:
    metrics:
      export:
        enabled: false
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
    logging:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/logs
logging:
  level:
    root: INFO

klimiter:
  domain-id: default
  stripes-count: 128
  default:
    limit: 60
    unit: SECOND
