spring:
  application:
    name: klimiter-service
  grpc:
    server:
      port: ${GRPC_PORT:9090}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,configprops
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 0
  otlp:
    metrics:
      export:
        enabled: false
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
    logging:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/logs
logging:
  level:
    root: INFO

klimiter:
  backend:
    mode: ${KLIMITER_MODE:REDIS_CLUSTER} #IN_MEMORY, REDIS_STANDALONE, REDIS_CLUSTER
    redis:
      uri: ${KLIMITER_REDIS_URI:redis://localhost:6379}
      uris: ${KLIMITER_REDIS_URIS:redis://localhost:7001,redis://localhost:7002,redis://localhost:7003}
      lease-percentage: 10
      key-prefix: klimiter
  domains:
    - id: default
      descriptors:
        - key: user_id
          rule:
            unit: SECOND
            requests-per-unit: 100
