syntax = "proto3";

package io.klimiter;

option java_package = "io.klimiter.generated.service.proto";
option java_multiple_files = true;

import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

service RateLimitService {
  rpc ShouldRateLimit(RateLimitRequest) returns (RateLimitResponse) {}
}

message RateLimitRequest {
  string domain = 1;
  repeated RateLimitDescriptor descriptors = 2;
  uint32 hits_addend = 3;
}

message RateLimitDescriptor {
  message Entry {
    string key = 1;
    string value = 2;
  }

  repeated Entry entries = 1;
  RateLimitOverride limit = 2;
  UInt64Value hits_addend = 3;
}

message UInt64Value {
  uint64 value = 1;
}

message RateLimitOverride {
  uint32 requests_per_unit = 1;
  RateLimitUnit unit = 2;
}

enum RateLimitUnit {
  RATE_LIMIT_UNIT_UNKNOWN = 0;
  SECOND = 1;
  MINUTE = 2;
  HOUR = 3;
  DAY = 4;
  MONTH = 5;
  YEAR = 6;
  WEEK = 7;
}

message RateLimitResponse {
  enum Code {
    UNKNOWN = 0;
    OK = 1;
    OVER_LIMIT = 2;
  }

  message RateLimit {
    enum Unit {
      UNKNOWN = 0;
      SECOND = 1;
      MINUTE = 2;
      HOUR = 3;
      DAY = 4;
      MONTH = 5;
      YEAR = 6;
      WEEK = 7;
    }

    uint32 requests_per_unit = 1;
    Unit unit = 2;
    string name = 3;
  }

  message DescriptorStatus {
    Code code = 1;
    RateLimit current_limit = 2;
    uint32 limit_remaining = 3;
    google.protobuf.Duration duration_until_reset = 4;
    Quota quota = 5;
  }

  message Quota {
    uint32 requests = 1;
    google.protobuf.Timestamp valid_until = 2;
    string id = 3;
  }

  Code overall_code = 1;

  repeated DescriptorStatus statuses = 2;
  repeated HeaderValue response_headers_to_add = 3;
  repeated HeaderValue request_headers_to_add = 4;
  bytes raw_body = 5;
  google.protobuf.Struct dynamic_metadata = 6;
  Quota quota = 7;
}

message HeaderValue {
  string key = 1;
  string value = 2;
}